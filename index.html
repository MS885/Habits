<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Habits</title>
<style>
:root {
  --bg0:#000; --bg1:#0D0D0D; --bg2:#161616; --bg3:#1E1E1E; --bg4:#282828;
  --sep:rgba(255,255,255,0.08);
  --txt:#F5F5F7; --txt2:rgba(245,245,247,0.55); --txt3:rgba(245,245,247,0.28);
  --blue:#0A84FF; --green:#30D158; --orange:#FF9F0A; --red:#FF453A;
  --purple:#BF5AF2; --teal:#5AC8FA; --yellow:#FFD60A;
  --font:-apple-system,'Helvetica Neue',sans-serif;
  --r:16px; --rs:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{background:var(--bg0);color:var(--txt);font-family:var(--font);min-height:100vh;overscroll-behavior:none;}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(28,28,30,0.94);backdrop-filter:blur(20px);border-top:1px solid var(--sep);display:flex;padding:10px 0 max(16px,env(safe-area-inset-bottom));z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:10px;font-weight:500;color:var(--txt3);letter-spacing:.02em;}
.tab.active .tab-label{color:var(--blue);}

/* PAGES */
.page{display:none;padding:0 0 100px;min-height:100vh;}
.page.active{display:block;}

/* HEADER */
.page-header{padding:56px 20px 14px;position:sticky;top:0;background:rgba(0,0,0,0.88);backdrop-filter:blur(20px);z-index:10;border-bottom:1px solid var(--sep);}
.page-header h1{font-size:34px;font-weight:700;letter-spacing:-.02em;}
.page-header .sub{font-size:13px;color:var(--txt2);margin-top:2px;}

/* CARD */
.card{background:var(--bg2);border-radius:var(--r);margin:12px 16px;overflow:hidden;}
.sec-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);padding:14px 16px 0;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 16px;}
.stat-card{background:var(--bg2);border-radius:var(--r);padding:14px;}
.stat-icon{font-size:20px;margin-bottom:6px;}
.stat-value{font-size:24px;font-weight:700;letter-spacing:-.03em;}
.stat-label{font-size:11px;color:var(--txt2);font-weight:500;margin-top:2px;}

/* PROGRESS */
.day-progress{padding:16px;}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.progress-label{font-size:15px;font-weight:600;}
.progress-pct{font-size:15px;font-weight:700;color:var(--blue);}
.progress-track{height:8px;background:var(--bg4);border-radius:100px;overflow:hidden;}
.progress-fill{height:100%;border-radius:100px;transition:width .6s cubic-bezier(.25,.46,.45,.94);background:linear-gradient(90deg,var(--blue),var(--teal));}
.progress-fill.full{background:linear-gradient(90deg,var(--green),#30d18088);}

/* WEEK STRIP */
.week-strip{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;}
.week-strip::-webkit-scrollbar{display:none;}
.week-day{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.wd-label{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;}
.wd-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;background:var(--bg2);color:var(--txt2);}
.wd-num.today{background:var(--blue);color:#fff;}
.wd-dot{width:4px;height:4px;border-radius:50%;background:transparent;}
.wd-dot.has{background:var(--green);}

/* HABIT ROW */
.habit-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--sep);cursor:pointer;transition:background .15s;position:relative;user-select:none;-webkit-user-select:none;}
.habit-row:last-child{border-bottom:none;}
.habit-row:active{background:var(--bg3);}
.habit-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.habit-row.done .habit-dot{transform:scale(1.08);}
.habit-info{flex:1;min-width:0;}
.habit-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s;}
.habit-row.done .habit-name{color:var(--txt2);text-decoration:line-through;text-decoration-color:var(--txt3);}
.habit-meta{display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap;}
.meta-chip{font-size:11px;font-weight:500;color:var(--txt3);}
.meta-chip.s{color:var(--orange);}
.meta-chip.p{color:var(--yellow);}
.week-mini{display:flex;gap:3px;margin-top:5px;}
.wm-cell{width:7px;height:7px;border-radius:2px;background:var(--bg4);}
.check-ring{width:28px;height:28px;border-radius:50%;border:2px solid var(--bg4);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);font-size:13px;color:transparent;}
.habit-row.done .check-ring{border-color:transparent;color:#fff;transform:scale(1.12);}
.del-btn{background:none;border:none;color:var(--red);font-size:13px;padding:8px;cursor:pointer;opacity:0;transition:opacity .2s;font-family:var(--font);}
.habit-row:hover .del-btn{opacity:1;}

/* ADD SECTION */
.add-section{margin:12px 16px;}
.emoji-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.emoji-btn{background:var(--bg2);border:1.5px solid var(--sep);border-radius:8px;padding:6px 10px;font-size:18px;cursor:pointer;transition:all .15s;}
.emoji-btn.selected{border-color:var(--blue);background:rgba(10,132,255,.18);}
.emoji-btn:active{transform:scale(.92);}
.color-row{display:flex;gap:8px;margin-bottom:12px;}
.color-btn{width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all .15s;flex-shrink:0;}
.color-btn.selected{border-color:#fff;transform:scale(1.22);}
.add-input-row{display:flex;gap:10px;}
.add-input{flex:1;background:var(--bg2);border:1.5px solid var(--sep);border-radius:var(--rs);padding:13px 15px;font-family:var(--font);font-size:15px;color:var(--txt);outline:none;transition:border-color .2s;}
.add-input::placeholder{color:var(--txt3);}
.add-input:focus{border-color:var(--blue);}
.add-btn{background:var(--blue);border:none;border-radius:var(--rs);color:#fff;font-family:var(--font);font-size:24px;font-weight:300;width:48px;flex-shrink:0;cursor:pointer;transition:opacity .15s,transform .15s;}
.add-btn:active{opacity:.8;transform:scale(.95);}

/* DASHBOARD */
.dash-hero{margin:12px 16px;background:linear-gradient(135deg,rgba(10,132,255,.14),rgba(90,200,250,.07));border:1px solid rgba(10,132,255,.22);border-radius:var(--r);padding:20px;}
.dash-hero-row{display:flex;align-items:center;gap:20px;}
.donut-wrap{position:relative;width:84px;height:84px;flex-shrink:0;}
.donut-wrap svg{transform:rotate(-90deg);}
.donut-bg{fill:none;stroke:var(--bg4);stroke-width:7;}
.donut-fg{fill:none;stroke:var(--blue);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.25,.46,.45,.94);}
.donut-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;}
.donut-pct{font-size:19px;font-weight:700;}
.donut-sub{font-size:9px;color:var(--txt2);margin-top:2px;font-weight:600;letter-spacing:.06em;}
.dash-hero-big{font-size:30px;font-weight:700;letter-spacing:-.03em;}
.dash-hero-sub{font-size:13px;color:var(--txt2);margin-top:2px;}
.dash-hero-stats{display:flex;gap:18px;margin-top:14px;}
.dhs-val{font-size:20px;font-weight:700;letter-spacing:-.02em;}
.dhs-lbl{font-size:11px;color:var(--txt2);font-weight:500;margin-top:1px;}

/* HABIT DETAIL CARDS */
.habit-dash-card{padding:14px 16px;border-bottom:1px solid var(--sep);}
.habit-dash-card:last-child{border-bottom:none;}
.hdc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.hdc-dot{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.hdc-name{font-size:14px;font-weight:600;}
.hdc-rate{font-size:12px;color:var(--txt2);margin-top:2px;}
.hdc-pr{margin-left:auto;text-align:right;}
.hdc-pr-val{font-size:18px;font-weight:700;color:var(--yellow);}
.hdc-pr-lbl{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.04em;}
.heatmap{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-top:4px;}
.hm-cell{aspect-ratio:1;border-radius:3px;background:var(--bg4);}
.full-bar-wrap{margin-top:10px;}
.full-bar-top{display:flex;justify-content:space-between;margin-bottom:5px;}
.full-bar-lbl{font-size:11px;color:var(--txt2);font-weight:500;}
.full-bar-val{font-size:11px;font-weight:700;}
.full-bar-track{height:5px;background:var(--bg4);border-radius:100px;overflow:hidden;}
.full-bar-fill{height:100%;border-radius:100px;transition:width .6s ease;}

/* EMPTY */
.empty-state{text-align:center;padding:48px 20px;color:var(--txt3);}
.empty-state .ei{font-size:48px;margin-bottom:12px;}
.empty-state .et{font-size:17px;font-weight:600;color:var(--txt2);margin-bottom:6px;}
.empty-state .es{font-size:13px;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.habit-row{animation:fadeUp .3s both;}

@media(min-width:700px){
  body{max-width:430px;margin:0 auto;}
  .tab-bar{max-width:430px;left:50%;transform:translateX(-50%);}
}
</style>
</head>
<body>

<!-- TODAY PAGE -->
<div class="page active" id="page-today">
  <div class="page-header">
    <h1>Today</h1>
    <div class="sub" id="todayDate"></div>
  </div>
  <div class="week-strip" id="weekStrip"></div>
  <div class="card">
    <div class="day-progress">
      <div class="progress-top">
        <span class="progress-label">Daily Progress</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="card"><div id="habitList"></div></div>

  <div class="add-section">
    <div class="sec-title" style="padding:0 0 10px;">New Habit</div>
    <div class="emoji-row" id="emojiPicker"></div>
    <div class="color-row" id="colorPicker"></div>
    <div class="add-input-row">
      <input class="add-input" id="habitInput" type="text" placeholder="e.g. Meditate, Read, Exercise…" maxlength="40"/>
      <button class="add-btn" onclick="addHabit()">+</button>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div class="page" id="page-dashboard">
  <div class="page-header">
    <h1>Dashboard</h1>
    <div class="sub">Your habit insights</div>
  </div>
  <div class="dash-hero" id="dashHero"></div>
  <div class="stats-row" id="dashStats"></div>
  <div class="sec-title">Habit Details</div>
  <div class="card" id="dashCards"></div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <div class="tab active" id="tab-today" onclick="switchTab('today')">
    <div class="tab-icon">☀️</div>
    <div class="tab-label">Today</div>
  </div>
  <div class="tab" id="tab-dashboard" onclick="switchTab('dashboard')">
    <div class="tab-icon">📊</div>
    <div class="tab-label">Dashboard</div>
  </div>
</div>

<script>
const KEY='habitsAppV4', TODAY=new Date().toISOString().slice(0,10);
const EMOJIS=['🧘','💪','📚','💧','🏃','🥗','😴','✍️','🎯','🎨','🎵','💊','🛁','🌿','☕'];
const COLORS=['#0A84FF','#30D158','#FF9F0A','#FF453A','#BF5AF2','#5AC8FA','#FFD60A','#FF6B6B'];
let selEmoji=EMOJIS[0], selColor=COLORS[0];

function load(){try{return JSON.parse(localStorage.getItem(KEY))||{habits:[],log:{}};}catch{return{habits:[],log:{}};}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d));}

let data=load();
// Migrate
data.habits=data.habits.map(h=>typeof h==='string'
  ?{id:Date.now()+Math.random(),name:h,emoji:'🎯',color:'#0A84FF',addedOn:TODAY}
  :{...h,emoji:h.emoji||'🎯',color:h.color||'#0A84FF',addedOn:h.addedOn||TODAY});
save(data);

// ── Helpers
function todaySet(){return new Set((data.log[TODAY]||[]).map(String));}
function isDone(id){return todaySet().has(String(id));}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getStreak(id){
  let n=0; const d=new Date();
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    if((data.log[k]||[]).includes(String(id))){n++;d.setDate(d.getDate()-1);}
    else if(i===0){d.setDate(d.getDate()-1);}
    else break;
  }
  return n;
}

function getBest(id){
  let best=0,cur=0;
  const d=new Date();
  for(let i=29;i>=0;i--){
    const dd=new Date(d);dd.setDate(dd.getDate()-i);
    const k=dd.toISOString().slice(0,10);
    if((data.log[k]||[]).includes(String(id))){cur++;best=Math.max(best,cur);}else cur=0;
  }
  // Also scan all history for true best
  const allDays=Object.keys(data.log).sort();
  let cur2=0,best2=0;
  allDays.forEach(k=>{
    if((data.log[k]||[]).includes(String(id))){cur2++;best2=Math.max(best2,cur2);}else cur2=0;
  });
  return Math.max(best,best2);
}

function getRate(id){
  const h=data.habits.find(x=>x.id===id);if(!h) return 0;
  const added=new Date(h.addedOn||TODAY);
  const days=Math.max(1,Math.ceil((new Date()-added)/86400000)+1);
  const cap=Math.min(days,30);
  let done=0; const d=new Date();
  for(let i=0;i<cap;i++){
    const k=d.toISOString().slice(0,10);
    if((data.log[k]||[]).includes(String(id)))done++;
    d.setDate(d.getDate()-1);
  }
  return Math.round((done/cap)*100);
}

function getDays30(id){
  const arr=[];const d=new Date();
  for(let i=29;i>=0;i--){
    const dd=new Date(d);dd.setDate(dd.getDate()-i);
    const k=dd.toISOString().slice(0,10);
    arr.push({date:k,done:!!(data.log[k]||[]).includes(String(id))});
  }
  return arr;
}

function getOverallStreak(){
  if(!data.habits.length)return 0;
  let n=0;const d=new Date();
  for(let i=0;i<365;i++){
    const k=d.toISOString().slice(0,10);
    const any=(data.log[k]||[]).length>0;
    if(any){n++;d.setDate(d.getDate()-1);}
    else if(i===0){d.setDate(d.getDate()-1);}
    else break;
  }
  return n;
}

// ── Tab switch
function switchTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='dashboard') renderDashboard();
}

// ── Toggle
function toggleHabit(id){
  if(!data.log[TODAY])data.log[TODAY]=[];
  const sid=String(id); const set=new Set(data.log[TODAY]);
  if(set.has(sid))set.delete(sid);else set.add(sid);
  data.log[TODAY]=[...set];
  save(data); renderToday();
}

// ── Add
function addHabit(){
  const inp=document.getElementById('habitInput');
  const name=inp.value.trim();if(!name)return;
  data.habits.push({id:Date.now(),name,emoji:selEmoji,color:selColor,addedOn:TODAY});
  save(data);inp.value='';renderToday();
}

function deleteHabit(id){
  data.habits=data.habits.filter(h=>h.id!==id);
  for(const day in data.log)data.log[day]=data.log[day].filter(x=>x!==String(id));
  save(data);renderToday();
}

// ── Pickers
function renderPickers(){
  document.getElementById('emojiPicker').innerHTML=
    EMOJIS.map(e=>`<button class="emoji-btn${e===selEmoji?' selected':''}" onclick="selEmoji='${e}';renderPickers()">${e}</button>`).join('');
  document.getElementById('colorPicker').innerHTML=
    COLORS.map(c=>`<button class="color-btn${c===selColor?' selected':''}" style="background:${c}" onclick="selColor='${c}';renderPickers()"></button>`).join('');
}

// ── Week strip
function renderWeekStrip(){
  const DAYS=['S','M','T','W','T','F','S'];
  const now=new Date(); let html='';
  for(let i=6;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const isToday=k===TODAY;
    const hasDone=(data.log[k]||[]).length>0;
    html+=`<div class="week-day">
      <div class="wd-label">${DAYS[d.getDay()]}</div>
      <div class="wd-num${isToday?' today':''}">${d.getDate()}</div>
      <div class="wd-dot${hasDone?' has':''}"></div>
    </div>`;
  }
  document.getElementById('weekStrip').innerHTML=html;
}

// ── Render today
function renderToday(){
  document.getElementById('todayDate').textContent=
    new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  renderWeekStrip();renderPickers();

  const done=data.habits.filter(h=>isDone(h.id)).length;
  const total=data.habits.length;
  const pct=total?Math.round((done/total)*100):0;
  const fill=document.getElementById('progressFill');
  fill.style.width=pct+'%';
  fill.className='progress-fill'+(pct===100?' full':'');
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressPct').style.color=pct===100?'var(--green)':'var(--blue)';

  const list=document.getElementById('habitList');
  if(!data.habits.length){
    list.innerHTML=`<div class="empty-state"><div class="ei">✨</div><div class="et">No habits yet</div><div class="es">Add your first habit below to get started</div></div>`;
    return;
  }

  list.innerHTML=data.habits.map((h,i)=>{
    const done=isDone(h.id);
    const streak=getStreak(h.id);
    const pr=getBest(h.id);
    const rate=getRate(h.id);
    const intensity=0.18+(rate/100)*0.72;
    const bgColor=rgba(h.color,intensity);
    const days7=getDays30(h.id).slice(-7);
    const wm=days7.map(d=>`<div class="wm-cell" style="${d.done?'background:'+rgba(h.color,.7):''}"></div>`).join('');
    return `<div class="habit-row${done?' done':''}" data-id="${h.id}" onclick="toggleHabit(${h.id})" style="animation-delay:${i*40}ms">
      <div class="habit-dot" style="background:${bgColor}">${h.emoji}</div>
      <div class="habit-info">
        <div class="habit-name">${esc(h.name)}</div>
        <div class="habit-meta">
          ${streak>0?`<span class="meta-chip s">🔥 ${streak}d</span>`:''}
          ${pr>1?`<span class="meta-chip p">⭐ PR ${pr}d</span>`:''}
          <span class="meta-chip">${rate}%</span>
        </div>
        <div class="week-mini">${wm}</div>
      </div>
      <div class="check-ring" style="background:${done?h.color:'transparent'};border-color:${done?h.color:'var(--bg4)'}">${done?'✓':''}</div>
      <button class="del-btn" onclick="event.stopPropagation();deleteHabit(${h.id})">✕</button>
    </div>`;
  }).join('');
}

// ── Render dashboard
function renderDashboard(){
  const total=data.habits.length;
  const done=data.habits.filter(h=>isDone(h.id)).length;
  const pct=total?Math.round((done/total)*100):0;
  let totalChecks=0;
  for(const day in data.log)totalChecks+=data.log[day].length;
  const overallStreak=getOverallStreak();
  const bestEver=total?Math.max(...data.habits.map(h=>getBest(h.id))):0;
  const avgRate=total?Math.round(data.habits.reduce((a,h)=>a+getRate(h.id),0)/total):0;

  // Donut
  const circ=226.2, offset=circ-(circ*pct/100);
  const strokeColor=pct===100?'var(--green)':'var(--blue)';
  document.getElementById('dashHero').innerHTML=`
    <div class="dash-hero-row">
      <div class="donut-wrap">
        <svg viewBox="0 0 84 84" width="84" height="84">
          <circle class="donut-bg" cx="42" cy="42" r="36"/>
          <circle class="donut-fg" cx="42" cy="42" r="36"
            stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            style="stroke:${strokeColor}"/>
        </svg>
        <div class="donut-txt">
          <div class="donut-pct">${pct}%</div>
          <div class="donut-sub">TODAY</div>
        </div>
      </div>
      <div>
        <div class="dash-hero-big">${done} / ${total}</div>
        <div class="dash-hero-sub">habits done today</div>
        <div class="dash-hero-stats">
          <div><div class="dhs-val" style="color:var(--orange)">🔥 ${overallStreak}</div><div class="dhs-lbl">Streak</div></div>
          <div><div class="dhs-val" style="color:var(--yellow)">⭐ ${bestEver}</div><div class="dhs-lbl">Best ever</div></div>
          <div><div class="dhs-val" style="color:var(--green)">✓ ${totalChecks}</div><div class="dhs-lbl">All-time</div></div>
        </div>
      </div>
    </div>`;

  document.getElementById('dashStats').innerHTML=`
    <div class="stat-card">
      <div class="stat-icon">📅</div>
      <div class="stat-value" style="color:var(--blue)">${Object.keys(data.log).length}</div>
      <div class="stat-label">Days logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📈</div>
      <div class="stat-value" style="color:var(--green)">${avgRate}%</div>
      <div class="stat-label">Avg rate</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-value" style="color:var(--yellow)">${bestEver}</div>
      <div class="stat-label">Best streak</div>
    </div>`;

  if(!data.habits.length){
    document.getElementById('dashCards').innerHTML=`<div class="empty-state"><div class="ei">📊</div><div class="et">No data yet</div><div class="es">Add habits to see your insights</div></div>`;
    return;
  }

  document.getElementById('dashCards').innerHTML=data.habits.map(h=>{
    const streak=getStreak(h.id);
    const pr=getBest(h.id);
    const rate=getRate(h.id);
    const days=getDays30(h.id);
    const hm=days.map(d=>`<div class="hm-cell" style="background:${d.done?rgba(h.color,.85):'var(--bg4)'}"></div>`).join('');
    return `<div class="habit-dash-card">
      <div class="hdc-top">
        <div class="hdc-dot" style="background:${rgba(h.color,.2)}">${h.emoji}</div>
        <div>
          <div class="hdc-name">${esc(h.name)}</div>
          <div class="hdc-rate">${rate}% rate · 🔥 ${streak}d streak</div>
        </div>
        <div class="hdc-pr">
          <div class="hdc-pr-val">⭐ ${pr}</div>
          <div class="hdc-pr-lbl">BEST STREAK</div>
        </div>
      </div>
      <div class="heatmap">${hm}</div>
      <div class="full-bar-wrap">
        <div class="full-bar-top">
          <span class="full-bar-lbl">30-day completion</span>
          <span class="full-bar-val" style="color:${h.color}">${rate}%</span>
        </div>
        <div class="full-bar-track">
          <div class="full-bar-fill" style="width:${rate}%;background:${h.color}"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('habitInput').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});

renderToday();
</script>
<script>
const SW_CODE = `
const CACHE_NAME = 'habits-app-v1';
self.addEventListener('install', event => { self.skipWaiting(); });
self.addEventListener('activate', event => { self.clients.claim(); });
self.addEventListener('fetch', event => {
  if (event.request.method !== 'GET') return;
  event.respondWith(fetch(event.request).catch(() => caches.match('/')));
});
`;

const MANIFEST = {
  name: "Habits - Daily Tracker",
  short_name: "Habits",
  description: "A minimalist daily habit tracker. Build streaks, track progress, and reach your personal bests.",
  start_url: "/",
  display: "standalone",
  background_color: "#000000",
  theme_color: "#000000",
  orientation: "portrait-primary",
  scope: "/",
  icons: [
    { src: "https://placehold.co/192x192/000000/0A84FF?text=H&font=helvetica", sizes: "192x192", type: "image/png", purpose: "any maskable" },
    { src: "https://placehold.co/512x512/000000/0A84FF?text=H&font=helvetica", sizes: "512x512", type: "image/png", purpose: "any maskable" }
  ]
};

// Inject manifest
const manifestBlob = new Blob([JSON.stringify(MANIFEST)], {type:'application/json'});
const manifestLink = document.createElement('link');
manifestLink.rel = 'manifest';
manifestLink.href = URL.createObjectURL(manifestBlob);
document.head.appendChild(manifestLink);

// Register service worker inline
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob), {scope:'/'}).catch(e => console.log('SW:', e));
}
</script>
</body>
